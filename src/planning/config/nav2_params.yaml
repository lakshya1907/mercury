planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]

    GridBased:
      # SmacPlanner2D uses A* — does NOT have NavFn's
      # "Failed to create plan from potential" backtracking bug.
      # More robust on large costmaps and unknown space.
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10


controller_server:
  ros__parameters:
    use_sim_time: True

    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # Generous tolerances — the gate plane logic in goal_decomposer
      # handles WP completion, not Nav2's goal checker.
      xy_goal_tolerance: 0.8
      yaw_goal_tolerance: 0.8
      stateful: True

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      min_vel_x: 0.0
      max_vel_x: 0.5
      max_vel_theta: 1.2

      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0

      acc_lim_x: 1.0
      acc_lim_theta: 2.0
      decel_lim_x: -2.5
      decel_lim_theta: -2.0

      vx_samples: 20
      vtheta_samples: 35  

      sim_time: 2.5
      linear_granularity: 0.05
      angular_granularity: 0.025

      transform_tolerance: 0.5

      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist

      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      GoalAlign.scale: 24.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0