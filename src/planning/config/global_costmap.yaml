global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link

      update_frequency: 2.0
      publish_frequency: 1.0
      transform_tolerance: 0.5      # ← add this

      rolling_window: false

      # Fixed size — matches lane/pothole costmap publishers exactly.
      # DO NOT add a static_layer for /map (SLAM) here — SLAM publishes
      # at 0.05m resolution which conflicts with our 0.10m costmaps and
      # causes the costmap to oscillate between sizes, aborting all goals.
      # SLAM is used for LOCALIZATION only (EKF + slam_toolbox).
      # Navigable space is defined by lane_layer (road boundaries).
      width:      70
      height:     70
      resolution: 0.10
      origin_x:  -35.0
      origin_y:  -35.0

      footprint: "[[0.25, 0.20], [0.25, -0.20], [-0.25, -0.20], [-0.25, 0.20]]"
      footprint_padding: 0.02

      plugins:
        - lane_layer
        - pothole_layer
        - obstacle_layer
        - inflation_layer

      # Lane boundary lethal cells — keeps robot inside the track.
      # Published by lane_costmap_node at 700×700 @ 0.10m.
      lane_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_topic: /perception/road_costmap
        map_subscribe_transient_local: True
        subscribe_to_updates: False

      # Pothole lethal circles — persistent, grows as robot explores track.
      # Published by pothole_costmap_node at 700×700 @ 0.10m.
      pothole_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_topic: /perception/pothole_costmap
        map_subscribe_transient_local: True
        subscribe_to_updates: True

      # LiDAR obstacles (drums, walls, people) — global marking.
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          sensor_frame: lidar_link
          data_type: LaserScan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          obstacle_min_range: 0.2
          obstacle_max_range: 8.0
          clearing: True
          marking: True
          raytrace_min_range: 0.10
          raytrace_max_range: 8.5
          inf_is_valid: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.6
        cost_scaling_factor: 0.5z #0.5